<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>解忧杂货铺</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;700&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
:root {
  --ink: #1a1410;
  --paper: #f5f0e8;
  --parchment: #ede5d0;
  --sepia: #8b6914;
  --deep: #2c1810;
  --midnight: #0d0b14;
  --stars: #c9a227;
  --mystic: #6b4e8a;
  --rose: #c17b6e;
  --teal: #4a7c7e;
  --fog: rgba(245,240,232,0.08);
  --glow: rgba(201,162,39,0.15);
  --sand-light: #f5e6c8;
  --sand-mid: #dfc9a0;
  --sand-dark: #c4a87a;
  --ocean-deep: #1a3a4a;
  --ocean-mid: #2a6070;
  --ocean-light: #4a9aaa;
  --foam: rgba(255,255,255,0.6);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body, html {
  width: 100%; height: 100%; overflow: hidden;
  background: var(--midnight);
  background-image: url('https://free.boltp.com/2026/03/08/69ad5f8597d38.webp');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  font-family: 'Noto Serif SC', 'Songti SC', serif;
  color: var(--paper);
  user-select: none;
}

/* ====== 星空背景 ====== */
#starfield {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
display: none;
}

/* ====== 主壳体 ====== */
#app {
  position: relative; width: 100%; height: 100%;
  overflow: hidden; z-index: 1;
  display: flex; flex-direction: column;
  max-width: 480px; margin: 0 auto;
}

/* ====== 顶部标题栏 ====== */
#topbar {
  position: relative; z-index: 100;
  padding: 52px 20px 16px;
  background: linear-gradient(180deg, rgba(13,11,20,0.98) 0%, rgba(13,11,20,0.6) 100%);
  text-align: center;
  flex-shrink: 0;
  border-bottom: 1px solid rgba(201,162,39,0.15);
}
.shop-title {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 26px; color: var(--stars);
  letter-spacing: 6px;
  text-shadow: 0 0 20px rgba(201,162,39,0.5), 0 0 40px rgba(201,162,39,0.2);
}
.shop-subtitle {
  font-size: 11px; color: rgba(245,240,232,0.45);
  letter-spacing: 3px; margin-top: 4px;
}

/* ====== 导航标签 ====== */
#tabs {
  display: flex; background: rgba(13,11,20,0.9);
  border-bottom: 1px solid rgba(201,162,39,0.12);
  flex-shrink: 0; position: relative; z-index: 100;
}
.tab {
  flex: 1; padding: 12px 4px; text-align: center;
  font-size: 12px; color: rgba(245,240,232,0.4);
  cursor: pointer; position: relative; letter-spacing: 1px;
  transition: color 0.3s;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.tab.active { color: var(--stars); }
.tab.active::after {
  content: ''; position: absolute; bottom: 0; left: 20%; right: 20%;
  height: 2px; background: var(--stars);
  box-shadow: 0 0 8px var(--stars);
  border-radius: 2px;
}
.tab-icon { display: flex; align-items: center; justify-content: center; }
.tab-icon svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

/* ====== 页面区域 ====== */
.page { display: none; flex: 1; overflow-y: auto; overflow-x: hidden; }
.page.active { display: flex; flex-direction: column; }
.page::-webkit-scrollbar { display: none; }

/* ====== 通用容器 ====== */
.section-pad { padding: 20px 18px; }

/* ====== SVG图标工具 ====== */
.ico { display: inline-flex; align-items: center; justify-content: center; }
.ico svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.ico-sm svg { width: 12px; height: 12px; }
.ico-lg svg { width: 24px; height: 24px; }
.ico-xl svg { width: 32px; height: 32px; }

/* ====== 信件列表 ====== */
.letter-card {
  background: rgba(237,229,208,0.06);
  border: 1px solid rgba(201,162,39,0.15);
  border-radius: 12px; margin-bottom: 14px;
  padding: 16px 16px 14px;
  cursor: pointer; position: relative;
  transition: all 0.25s;
  backdrop-filter: blur(4px);
}
.letter-card:active { transform: scale(0.98); background: rgba(237,229,208,0.1); }
.letter-card.unread::before {
  content: ''; position: absolute; top: 14px; right: 14px;
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--stars); box-shadow: 0 0 6px var(--stars);
}
.letter-card.from-parallel { border-color: rgba(107,78,138,0.4); background: rgba(107,78,138,0.06); }
.letter-card.from-stranger { border-color: rgba(74,124,126,0.3); background: rgba(74,124,126,0.05); }
.letter-card.from-x { border-color: rgba(193,123,110,0.4); background: rgba(193,123,110,0.06); }
.letter-card.from-me { border-color: rgba(193,123,110,0.2); background: rgba(193,123,110,0.03); }

.letter-from {
  font-size: 10px; letter-spacing: 2px; margin-bottom: 8px;
  display: flex; align-items: center; gap: 6px;
}
.from-tag {
  padding: 2px 8px; border-radius: 20px; font-size: 9px; letter-spacing: 1px;
  display: inline-flex; align-items: center; gap: 4px;
}
.tag-parallel { background: rgba(107,78,138,0.3); color: #c4a8e0; border: 1px solid rgba(107,78,138,0.4); }
.tag-stranger { background: rgba(74,124,126,0.3); color: #a8d4d6; border: 1px solid rgba(74,124,126,0.4); }
.tag-x { background: rgba(193,123,110,0.3); color: #e8b4a8; border: 1px solid rgba(193,123,110,0.4); }
.tag-me { background: rgba(245,240,232,0.1); color: rgba(245,240,232,0.5); border: 1px solid rgba(245,240,232,0.15); }

.letter-date { font-size: 10px; color: rgba(245,240,232,0.3); margin-left: auto; }
.letter-preview {
  font-size: 13px; line-height: 1.8; color: rgba(245,240,232,0.75);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  overflow: hidden;
}
.letter-attachment {
  display: flex; align-items: center; gap: 6px; margin-top: 10px;
  font-size: 11px; color: var(--stars); opacity: 0.8;
}

/* ====== 平行时空来信特效 ====== */
.parallel-glow {
  box-shadow: 0 0 20px rgba(107,78,138,0.2), inset 0 0 20px rgba(107,78,138,0.04);
}
/* X来信特效 */
.x-glow {
  box-shadow: 0 0 20px rgba(193,123,110,0.2), inset 0 0 20px rgba(193,123,110,0.04);
}

/* ====== 写信浮动按钮 ====== */
#write-btn {
  position: fixed; bottom: 24px; right: 24px;
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--sepia), var(--stars));
  border: none; cursor: pointer; z-index: 500;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(201,162,39,0.4), 0 0 40px rgba(201,162,39,0.15);
  transition: transform 0.2s;
  color: var(--midnight);
}
#write-btn svg { width: 22px; height: 22px; stroke: var(--midnight); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
#write-btn:active { transform: scale(0.92); }

/* ====== 写信面板 ====== */
#write-panel {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 600; display: none;
  background: rgba(13,11,20,0.97);
  flex-direction: column;
  animation: panelIn 0.4s cubic-bezier(0.34,1.2,0.64,1);
}
#write-panel.open { display: flex; }
@keyframes panelIn {
  from { transform: translateY(100%); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.panel-header {
  padding: 52px 20px 16px; display: flex; align-items: center;
  border-bottom: 1px solid rgba(201,162,39,0.12);
  flex-shrink: 0;
}
.panel-back {
  cursor: pointer; padding: 4px 12px 4px 0;
  color: rgba(245,240,232,0.6); transition: color 0.2s;
  display: flex; align-items: center;
}
.panel-back:active { color: var(--stars); }
.panel-back svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.panel-title { font-family: 'Ma Shan Zheng', cursive; font-size: 20px; color: var(--stars); letter-spacing: 3px; }

/* 信封样式写信区 */
.envelope-wrap {
  flex: 1; overflow-y: auto; padding: 20px 18px 100px;
}
.envelope-wrap::-webkit-scrollbar { display: none; }

.envelope-paper {
  background: linear-gradient(160deg, #f9f3e5 0%, #f0e8d0 40%, #ebe0c5 100%);
  border-radius: 4px 4px 0 0;
  padding: 28px 22px;
  position: relative;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  min-height: 340px;
}
.envelope-paper::before {
  content: '';
  position: absolute; top: 56px; left: 22px; right: 22px; bottom: 22px;
  background-image: repeating-linear-gradient(
    transparent, transparent 29px, rgba(139,105,20,0.15) 29px, rgba(139,105,20,0.15) 30px
  );
  pointer-events: none;
}
.paper-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 20px;
}
.paper-stamp {
  width: 44px; height: 56px; border: 2px solid var(--sepia);
  border-radius: 2px; display: flex; align-items: center; justify-content: center;
  background: rgba(139,105,20,0.08);
  cursor: pointer; position: relative; overflow: hidden;
  flex-shrink: 0; color: var(--sepia);
}
.paper-stamp svg { width: 24px; height: 24px; stroke: var(--sepia); fill: none; stroke-width: 1.5; }
.paper-stamp::after {
  content: '';
  position: absolute; top: -1px; bottom: -1px; left: -1px; right: -1px;
  border: 3px dashed rgba(139,105,20,0.3);
  border-radius: 2px;
}
.paper-to {
  font-size: 12px; color: var(--sepia); flex: 1; margin-right: 10px;
  font-style: italic; line-height: 1.6;
}
.letter-textarea {
  width: 100%; background: transparent; border: none; outline: none;
  font-family: 'Noto Serif SC', serif; font-size: 14px;
  color: #2c1810; line-height: 30px; resize: none;
  min-height: 220px;
  position: relative; z-index: 1;
  caret-color: var(--sepia);
}
.letter-textarea::placeholder { color: rgba(44,24,16,0.35); font-style: italic; }

.envelope-bottom {
  background: linear-gradient(160deg, #c4973a 0%, #8b6914 100%);
  height: 30px; border-radius: 0 0 4px 4px;
  position: relative; overflow: hidden;
}
.envelope-bottom::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 30px;
  background: linear-gradient(135deg, transparent 50%, rgba(0,0,0,0.2) 50%),
              linear-gradient(-135deg, transparent 50%, rgba(0,0,0,0.2) 50%);
  background-size: 60px 60px;
}

.send-options {
  display: flex; gap: 10px; margin: 16px 0;
}
.anon-toggle {
  flex: 1; padding: 12px; border-radius: 10px; border: 1px solid rgba(201,162,39,0.25);
  background: rgba(201,162,39,0.07); color: var(--paper);
  font-size: 12px; text-align: center; cursor: pointer;
  transition: all 0.2s; font-family: inherit;
}
.anon-toggle.active { background: rgba(201,162,39,0.2); border-color: rgba(201,162,39,0.5); color: var(--stars); }

.send-btn {
  width: 100%; padding: 15px; border-radius: 12px; border: none;
  background: linear-gradient(135deg, var(--sepia), var(--stars));
  color: var(--midnight); font-size: 15px; font-family: inherit;
  font-weight: 500; cursor: pointer; letter-spacing: 3px;
  box-shadow: 0 4px 15px rgba(201,162,39,0.3);
  transition: transform 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.send-btn:active { transform: scale(0.97); }
.send-btn:disabled { opacity: 0.5; cursor: default; }
.send-btn svg { width: 16px; height: 16px; stroke: var(--midnight); fill: none; stroke-width: 2; }

/* ====== 信件详情面板 ====== */
#letter-panel {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 600; display: none;
  background: rgba(13,11,20,0.97);
  flex-direction: column;
}
#letter-panel.open { display: flex; animation: panelIn 0.4s cubic-bezier(0.34,1.2,0.64,1); }

.letter-full-wrap {
  flex: 1; overflow-y: auto; padding: 20px 18px 100px;
}
.letter-full-wrap::-webkit-scrollbar { display: none; }

.letter-paper-full {
  background: linear-gradient(160deg, #f9f3e5 0%, #f0e8d0 100%);
  border-radius: 4px; padding: 32px 24px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  position: relative; min-height: 400px;
}
.letter-paper-full::before {
  content: '';
  position: absolute; top: 70px; left: 24px; right: 24px; bottom: 24px;
  background-image: repeating-linear-gradient(
    transparent, transparent 29px, rgba(139,105,20,0.15) 29px, rgba(139,105,20,0.15) 30px
  );
  pointer-events: none;
}
.letter-author {
  font-family: 'Ma Shan Zheng', cursive;
  font-size: 16px; color: var(--sepia); margin-bottom: 6px;
}
.letter-datetime { font-size: 11px; color: rgba(44,24,16,0.5); margin-bottom: 20px; }
.letter-body {
  font-size: 14px; color: #2c1810; line-height: 30px;
  position: relative; z-index: 1; white-space: pre-wrap;
}
.letter-sig { margin-top: 24px; text-align: right; font-family: 'Ma Shan Zheng', cursive; color: var(--sepia); font-size: 16px; }

.attachment-box {
  margin: 16px 0; padding: 14px 16px;
  background: rgba(201,162,39,0.08); border: 1px solid rgba(201,162,39,0.2);
  border-radius: 10px; display: flex; align-items: center; gap: 12px;
  cursor: pointer; color: var(--stars);
}
.attachment-box:active { background: rgba(201,162,39,0.15); }
.attachment-desc { font-size: 12px; color: rgba(245,240,232,0.6); margin-top: 2px; }

.reply-btn {
  width: 100%; padding: 14px; border-radius: 12px; border: none;
  background: transparent; border: 1px solid rgba(201,162,39,0.3);
  color: var(--stars); font-size: 14px; font-family: inherit;
  cursor: pointer; letter-spacing: 2px; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.reply-btn:active { background: rgba(201,162,39,0.1); }
.reply-btn svg { width: 16px; height: 16px; stroke: var(--stars); fill: none; stroke-width: 1.5; }

/* ====== 漂流瓶页面 - 沙滩主题 ====== */
.beach-scene {
  position: relative; overflow: hidden;
  height: 320px; flex-shrink: 0;
  background: linear-gradient(180deg,
    #87CEEB 0%,
    #5DADE2 15%,
    #2E86C1 30%,
    #1B6CA0 45%,
    var(--sand-mid) 55%,
    var(--sand-light) 65%,
    var(--sand-dark) 100%
  );
  touch-action: none;
}

/* 太阳 */
.beach-sun {
  position: absolute; top: 20px; right: 30px;
  width: 50px; height: 50px; border-radius: 50%;
  background: radial-gradient(circle, #FFD700 0%, #FFA500 60%, transparent 70%);
  box-shadow: 0 0 40px rgba(255,215,0,0.6), 0 0 80px rgba(255,165,0,0.3);
  animation: sunPulse 4s ease-in-out infinite alternate;
}
@keyframes sunPulse { from { box-shadow: 0 0 40px rgba(255,215,0,0.6); } to { box-shadow: 0 0 60px rgba(255,215,0,0.8); } }

/* 云朵 - 用SVG线条 */
.beach-cloud {
  position: absolute; opacity: 0.6;
  animation: cloudDrift 20s linear infinite;
}
.beach-cloud:nth-child(2) { top: 15px; left: -60px; animation-duration: 25s; animation-delay: -8s; opacity: 0.4; }
.beach-cloud:nth-child(3) { top: 45px; left: -100px; animation-duration: 30s; animation-delay: -15s; opacity: 0.3; }
@keyframes cloudDrift { from { transform: translateX(-100px); } to { transform: translateX(calc(100vw + 100px)); } }

/* 海浪 */
.sea-wave {
  position: absolute; width: 200%; left: -50%;
  height: 20px; border-radius: 50%;
}
.sea-wave-1 { bottom: 140px; background: rgba(46,134,193,0.4); animation: seaWave 5s ease-in-out infinite; }
.sea-wave-2 { bottom: 135px; background: rgba(93,173,226,0.3); animation: seaWave 7s ease-in-out infinite reverse; }
.sea-wave-3 { bottom: 130px; background: rgba(255,255,255,0.15); animation: seaWave 4s ease-in-out infinite; animation-delay: -1s; }
@keyframes seaWave { 0%,100% { transform: translateX(0); } 50% { transform: translateX(-3%); } }

/* 泡沫线 */
.foam-line {
  position: absolute; bottom: 128px; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.5) 20%, rgba(255,255,255,0.7) 50%, rgba(255,255,255,0.5) 80%, transparent 100%);
  animation: foamShimmer 3s ease-in-out infinite;
}
@keyframes foamShimmer { 0%,100% { opacity: 0.5; } 50% { opacity: 0.9; } }

/* 沙滩上的漂流瓶 */
.beach-bottles-area {
  position: absolute; bottom: 20px; left: 0; right: 0;
  height: 110px; padding: 0 15px;
}

.beach-bottle {
  position: absolute; cursor: pointer;
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  animation: bottleWobble 3s ease-in-out infinite;
}
.beach-bottle:active { transform: scale(1.15) !important; }
.beach-bottle svg { filter: drop-shadow(2px 3px 4px rgba(0,0,0,0.2)); }
.beach-bottle.grabbed { animation: bottleGrab 0.6s ease forwards; }
@keyframes bottleWobble {
  0%,100% { transform: rotate(-3deg); }
  50% { transform: rotate(3deg); }
}
@keyframes bottleGrab {
  0% { transform: scale(1); opacity: 1; }
  30% { transform: scale(1.3) rotate(15deg); }
  100% { transform: scale(0) translateY(-60px); opacity: 0; }
}

/* 沙滩上的装饰 - 贝壳、海星用SVG */
.beach-decor {
  position: absolute; opacity: 0.35; color: var(--sand-dark);
}

/* 海浪中漂来的瓶子 */
.floating-bottle {
  position: absolute; top: 100px;
  animation: floatInWave 6s ease-in-out infinite;
  cursor: pointer; opacity: 0.8;
}
.floating-bottle svg { filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3)); }
@keyframes floatInWave {
  0%,100% { transform: translateY(0) rotate(-5deg); }
  25% { transform: translateY(-8px) rotate(3deg); }
  50% { transform: translateY(2px) rotate(-3deg); }
  75% { transform: translateY(-5px) rotate(5deg); }
}

/* 信息栏 */
.beach-info {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 8px 15px;
  background: linear-gradient(0deg, rgba(196,168,122,0.9) 0%, transparent 100%);
  display: flex; justify-content: center; gap: 16px;
}
.beach-chip {
  padding: 4px 12px; border-radius: 20px;
  background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.3);
  font-size: 10px; color: var(--deep); letter-spacing: 1px;
  backdrop-filter: blur(4px);
  display: flex; align-items: center; gap: 4px;
}
.beach-chip svg { width: 12px; height: 12px; stroke: var(--deep); fill: none; stroke-width: 1.5; }
.beach-chip b { font-weight: 600; }

.beach-hint {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  font-size: 10px; color: rgba(255,255,255,0.7); letter-spacing: 2px;
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
}

/* ====== 漂流瓶列表 ====== */
.drift-card {
  background: rgba(74,124,126,0.08);
  border: 1px solid rgba(74,124,126,0.2);
  border-radius: 12px; margin-bottom: 14px;
  padding: 16px; cursor: pointer;
  position: relative; overflow: hidden;
}
.drift-card::before {
  content: attr(data-from);
  position: absolute; top: 10px; right: 12px;
  font-size: 9px; color: rgba(168,212,214,0.5); letter-spacing: 1px;
}
.drift-card:active { background: rgba(74,124,126,0.14); }
.drift-mood { margin-bottom: 8px; display: flex; align-items: center; color: var(--teal); }
.drift-mood svg { width: 20px; height: 20px; stroke: var(--teal); fill: none; stroke-width: 1.5; }
.drift-preview { font-size: 13px; color: rgba(245,240,232,0.7); line-height: 1.7; }
.drift-foot { margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
.drift-time { font-size: 10px; color: rgba(245,240,232,0.3); }
.drift-reply-hint { font-size: 10px; color: rgba(168,212,214,0.6); display: flex; align-items: center; gap: 3px; }
.drift-gift-hint { font-size: 10px; color: var(--stars); display: flex; align-items: center; gap: 3px; }

/* ====== 纪念柜页面 ====== */
.cabinet-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
}
.cabinet-item {
  background: rgba(237,229,208,0.05);
  border: 1px solid rgba(201,162,39,0.12);
  border-radius: 12px; padding: 16px 14px;
  cursor: pointer; text-align: center; position: relative;
  transition: all 0.2s;
}
.cabinet-item:active { transform: scale(0.96); background: rgba(237,229,208,0.09); }
.cabinet-icon { margin-bottom: 8px; display: flex; align-items: center; justify-content: center; color: var(--stars); }
.cabinet-icon svg { width: 32px; height: 32px; stroke: var(--stars); fill: none; stroke-width: 1.5; }

.cabinet-detail-panel.open { display: flex; animation: panelIn 0.4s cubic-bezier(0.34,1.2,0.64,1); }

.cabinet-showcase {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px; padding: 40px 30px;
}
.showcase-icon { color: var(--stars); animation: float 3s ease-in-out infinite alternate; }
.showcase-icon svg { width: 80px; height: 80px; stroke: var(--stars); fill: none; stroke-width: 1; }
.showcase-title { font-family: 'Ma Shan Zheng', cursive; font-size: 22px; color: var(--stars); letter-spacing: 4px; }
.showcase-desc { font-size: 13px; color: rgba(245,240,232,0.55); text-align: center; line-height: 1.8; max-width: 280px; white-space: pre-wrap; }
.showcase-from { font-size: 12px; color: rgba(245,240,232,0.35); margin-top: 8px; }

/* ====== 空状态 ====== */
.empty-state {
  text-align: center; padding: 60px 30px;
  color: rgba(245,240,232,0.3);
}
.empty-icon { margin-bottom: 16px; display: flex; align-items: center; justify-content: center; opacity: 0.4; }
.empty-icon svg { width: 48px; height: 48px; stroke: currentColor; fill: none; stroke-width: 1; }
.empty-text { font-size: 13px; line-height: 1.8; letter-spacing: 1px; }

/* ====== 投信动画 ====== */
.mailbox-anim {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  z-index: 800; pointer-events: none; display: none;
  flex-direction: column; align-items: center; gap: 12px;
}
.mailbox-anim.show { display: flex; animation: mailAnim 2s ease forwards; }
@keyframes mailAnim {
  0% { opacity: 0; transform: translate(-50%, -40%); }
  20% { opacity: 1; transform: translate(-50%, -50%); }
  70% { opacity: 1; transform: translate(-50%, -50%); }
  100% { opacity: 0; transform: translate(-50%, -60%); }
}
.mailbox-anim-icon { color: var(--stars); }
.mailbox-anim-icon svg { width: 60px; height: 60px; stroke: var(--stars); fill: none; stroke-width: 1.5; }
.mailbox-text { font-size: 13px; color: var(--stars); letter-spacing: 3px; text-align: center; line-height: 1.8; }

/* ====== 礼物弹窗 ====== */
#gift-modal {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 850; display: none;

  align-items: center; justify-content: center;
}
#gift-modal.show { display: flex; }
.gift-card {
  background: linear-gradient(160deg, #1a1528 0%, #12101e 100%);

  border-radius: 24px; padding: 36px 28px;
  text-align: center; max-width: 300px; width: 88%;
  box-shadow: 0 0 60px rgba(201,162,39,0.15);
  animation: giftPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes giftPop {
  from { opacity: 0; transform: scale(0.7); }
  to { opacity: 1; transform: scale(1); }
}
.gift-icon-big { display: flex; align-items: center; justify-content: center; margin-bottom: 16px; color: var(--stars); animation: float 2s ease-in-out infinite alternate; }
.gift-icon-big svg { width: 64px; height: 64px; stroke: var(--stars); fill: none; stroke-width: 1.5; }
.gift-title { font-family: 'Ma Shan Zheng', cursive; font-size: 20px; color: var(--stars); letter-spacing: 3px; margin-bottom: 8px; }
.gift-desc { font-size: 13px; color: rgba(245,240,232,0.6); line-height: 1.8; margin-bottom: 20px; }
.gift-close-btn {
  padding: 12px 32px; border-radius: 30px; border: none;

  cursor: pointer; letter-spacing: 2px;
}

/* ====== AI 加载状态 ====== */
.ai-loading {
  display: flex; align-items: center; gap: 8px;
  padding: 12px; color: rgba(245,240,232,0.4);
  font-size: 12px; letter-spacing: 1px;
}
.ai-dots { display: flex; gap: 4px; }
.ai-dots span {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--stars); opacity: 0.5;
  animation: dotBlink 1.2s infinite;
}
.ai-dots span:nth-child(2) { animation-delay: 0.2s; }
.ai-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBlink { 0%,80%,100% { opacity: 0.2; } 40% { opacity: 1; } }

/* ====== 通知徽标 ====== */
.badge {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 16px; height: 16px;
  background: var(--rose); border-radius: 8px;
  font-size: 9px; color: white; text-align: center; line-height: 16px;
  padding: 0 4px; margin-left: 4px;
}

/* ====== 滚动内容区 ====== */
.page-content { padding: 16px 18px 100px; }

/* section header */
.sec-head {
  font-size: 11px; color: rgba(245,240,232,0.35);
  letter-spacing: 3px; margin: 20px 0 12px;
  display: flex; align-items: center; gap: 10px;
}
.sec-head::after { content: ''; flex: 1; height: 1px; background: rgba(201,162,39,0.12); }

/* ====== 漂流瓶详情 ====== */
#drift-panel {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 650; display: none; background: rgba(13,11,20,0.98);
  flex-direction: column;
}
#drift-panel.open { display: flex; animation: panelIn 0.4s cubic-bezier(0.34,1.2,0.64,1); }

/* 回信输入 */
.reply-wrap { padding: 16px 18px; flex-shrink: 0; }
.reply-input {
  width: 100%; background: rgba(237,229,208,0.06);
  border: 1px solid rgba(201,162,39,0.2); border-radius: 12px;

  outline: none; resize: none; min-height: 80px; caret-color: var(--stars);
}
.reply-input::placeholder { color: rgba(245,240,232,0.25); }

/* ====== 写投瓶信面板 ====== */
#drift-write-panel {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 660; display: none; background: rgba(13,11,20,0.97);
  flex-direction: column;
}
#drift-write-panel.open { display: flex; animation: panelIn 0.4s cubic-bezier(0.34,1.2,0.64,1); }

@keyframes float { from { transform: translateY(0px); } to { transform: translateY(-12px); } }

/* ====== 沙滩粒子 ====== */
.sand-sparkle {
  position: absolute; width: 2px; height: 2px; border-radius: 50%;
  background: rgba(255,255,255,0.6);
  animation: sparkle 2s ease-in-out infinite;
}
@keyframes sparkle { 0%,100% { opacity: 0; } 50% { opacity: 1; } }

/* X的神秘标识 */
.x-mark {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border-radius: 50%;

/* ====== 删除模式 ====== */

.manage-btn:active { background: rgba(201,162,39,0.15); }
.manage-btn.danger { border-color: rgba(193,100,100,0.5); color: #e88; }

.letter-card.selectable { padding-left: 40px; }
.letter-card .select-check {

.letter-card.selected .select-check::after {

}

.select-all-row {

  font-size: 11px; color: rgba(245,240,232,0.5);
}
</style>

// ====== 星空 ======
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const stars = Array.from({length: 120}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 1.5 + 0.3,
    speed: Math.random() * 0.008 + 0.003,
    phase: Math.random() * Math.PI * 2
  }));
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = Date.now() / 1000;
    stars.forEach(s => {
      const alpha = 0.3 + 0.6 * (0.5 + 0.5 * Math.sin(t * s.speed * 6 + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,230,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ====== IndexedDB（与 chat.html 共享） ======
const DB = {
  db: null,
  async init() {
    return new Promise((resolve) => {
      const req = indexedDB.open('InsChatLargeDB', 1);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains('store')) db.createObjectStore('store');
      };
      req.onsuccess = e => { this.db = e.target.result; resolve(); };
      req.onerror = () => resolve();
    });
  },
  async get(key) {
    if (!this.db) return null;
    return new Promise(resolve => {
      try {
        const tx = this.db.transaction('store', 'readonly');
        const req = tx.objectStore('store').get(key);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => resolve(null);
      } catch(e) { resolve(null); }
    });
  },
  async set(key, val) {
    if (!this.db) return;
    return new Promise(resolve => {
      try {
        const tx = this.db.transaction('store', 'readwrite');
        tx.objectStore('store').put(val, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => resolve();
      } catch(e) { resolve(); }
    });
  }
};

const MY_SETTINGS_KEY = 'my_settings_v1';
const JIEYOU_KEY = 'jieyou_data_v2';
const JIEYOU_LIMITS_KEY = 'jieyou_limits_v1';

// ====== 全局状态 ======
let apiConfig = null;   // { url, key, model } - 来自 chat.html 的 OpenAI 兼容 API
let charName = 'Char';

};

// ====== 初始化 ======
async function init() {
  await DB.init();

  // 读取 API 配置（chat.html 使用 OpenAI 格式）
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) {
      const cfg = JSON.parse(raw);
      apiConfig = { url: cfg.url, key: cfg.key, model: cfg.model };
    }
  } catch(e) {}

  // 读取用户设置
  try {
    const ms = JSON.parse(localStorage.getItem(MY_SETTINGS_KEY) || '{}');
    if (ms.name) myName = ms.name;
    if (ms.persona) myPersona = ms.persona;
  } catch(e) {}

  // 读取 Char 信息 —— 找到第一个好友类型的角色作为恋人
  try {
    const chatList = await DB.get('ins_chat_list_v1');
    if (chatList && chatList.length > 0) {
      // 优先找第一个好友（非群聊）
      const lover = chatList.find(c => c.type !== 'group') || chatList[0];
      charName = lover.alias || lover.name || 'Char';
      charPrompt = lover.prompt || '';
      charAvatar = lover.avatar || '';
      loverChatId = lover.id;
    }
  } catch(e) {}

  // 读取解忧数据
  try {
    const saved = await DB.get(JIEYOU_KEY);
    if (saved) {
      // 兼容旧数据
      if (!saved.xLetters) saved.xLetters = [];
      Object.assign(jData, saved);
    }
  } catch(e) {}

  // 读取每日限制
  try {
    const limits = JSON.parse(localStorage.getItem(JIEYOU_LIMITS_KEY) || '{}');
    const today = new Date().toDateString();
    if (limits.date === today) {
      todayLimits = limits;
    } else {
      todayLimits = { pickCount: 6, throwCount: 3, date: today };
      saveLimits();
    }
  } catch(e) {}

  // 如果没有 Char 来信，生成第一封
  if (jData.parallelLetters.length === 0 && apiConfig) {
    generateCharLetter();
  }

  // 生成沙滩上的瓶子
  generateBeachBottles();

  renderAll();
}

function saveLimits() {
  localStorage.setItem(JIEYOU_LIMITS_KEY, JSON.stringify(todayLimits));
}

function createLetterCard(type, idx, letter) {
  const div = document.createElement('div');
  const cardClass = type === 'x' ? 'from-x' : type === 'parallel' ? 'from-parallel' : type === 'stranger' ? 'from-stranger' : 'from-me';
    div.className = `letter-card ${cardClass}`;
  div.dataset.letterType = type;
  div.dataset.letterIdx = idx;
  if (type === 'parallel') div.classList.add('parallel-glow');
  if (type === 'x') div.classList.add('x-glow');
  if (letter.unread) div.classList.add('unread');

  let tagClass, tagText, tagIcon;
  if (type === 'x') {
    tagClass = 'tag-x';
    tagText = 'X';
    tagIcon = '<span class="x-mark">X</span>';
  } else if (type === 'parallel') {
    tagClass = 'tag-parallel';
    tagText = `平行时空 · ${charName}`;
    tagIcon = iconSvg('compass', 10);
  } else if (type === 'stranger') {
    tagClass = 'tag-stranger';
    tagText = `陌生人 · ${letter.penName || '匿名'}`;
    tagIcon = iconSvg('moon', 10);
    } else {
    tagClass = 'tag-me';
    tagText = `我写的 · ${letter.penName || '匿名'}`;
    tagIcon = iconSvg('pen', 10);
  }

  const preview = (letter.body || '').replace(/\n/g, ' ').substring(0, 60) + '…';

  div.innerHTML = `
    <div class="letter-from">
      <span class="from-tag ${tagClass}">${tagIcon} ${tagText}</span>
      <span class="letter-date">${formatDate(letter.date)}</span>
    </div>
    <div class="letter-preview">${preview}</div>
    ${letter.gift ? `<div class="letter-attachment">${iconSvg('gift', 14)} 随信附件：${letter.gift.name}</div>` : ''}
  `;

    // 加入选择圆圈
  const checkEl = document.createElement('div');
  checkEl.className = 'select-check';
  div.appendChild(checkEl);

  div.onclick = () => {
    if (isManageMode) {
      div.classList.toggle('selected');
    } else {
      openLetterById(type, idx);
    }
  };
  return div;
}

function renderCabinet() {
  const charItems = jData.cabinet.filter(c => c.from === 'parallel');
  const strangerItems = jData.cabinet.filter(c => c.from === 'stranger');

  const charContainer = document.getElementById('char-cabinet');
  const strangerContainer = document.getElementById('stranger-cabinet');

  charContainer.innerHTML = '';
  strangerContainer.innerHTML = '';

  if (charItems.length === 0 && strangerItems.length === 0) {
    document.getElementById('cabinet-empty').style.display = 'block';
  } else {
    document.getElementById('cabinet-empty').style.display = 'none';
  }

  charItems.forEach((item) => {
    charContainer.appendChild(createCabinetItem(item, jData.cabinet.indexOf(item)));
  });

  strangerItems.forEach((item) => {
    strangerContainer.appendChild(createCabinetItem(item, jData.cabinet.indexOf(item)));
  });
}

function createCabinetItem(item, idx) {
  const div = document.createElement('div');
  div.className = 'cabinet-item' + (item.isNew ? ' cabinet-new' : '');
  const iconName = item.iconName || 'gift';
  div.innerHTML = `
    <div class="cabinet-icon">${iconSvg(iconName, 32)}</div>
    <div class="cabinet-name">${item.name}</div>
    <div class="cabinet-date">${item.date || ''}</div>
  `;
  div.onclick = () => openCabinet(idx);
  return div;
}

let beachBottles = [];
function generateBeachBottles() {
  const area = document.getElementById('beach-bottles');
  area.innerHTML = '';
  beachBottles = [];

  const positions = [
    { left: '5%',  bottom: '25px', delay: 0 },
    { left: '18%', bottom: '55px', delay: 0.3 },
    { left: '33%', bottom: '18px', delay: 0.8 },
    { left: '50%', bottom: '48px', delay: 0.5 },
    { left: '65%', bottom: '28px', delay: 1.0 },
    { left: '82%', bottom: '42px', delay: 0.6 },
  ];
  const colors = ['#c9a227','#a8d4d6','#c4a8e0','#e8b4a8','#88c999','#d4a8d6'];
  const pickable = todayLimits.pickCount;

  for (let i = 0; i < positions.length; i++) {
    const pos = positions[i];
    const canPick = i < pickable;
    const el = document.createElement('div');
    el.className = 'beach-bottle';
    el.style.left = pos.left;
    el.style.bottom = pos.bottom;
    el.style.animationDelay = pos.delay + 's';
    if (!canPick) el.style.opacity = '0.3';
    el.innerHTML = `<svg width="36" height="48" viewBox="0 0 36 48" fill="none" stroke="${colors[i % 6]}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M13 7h10v4c3 2 5 6 5 12v12c0 3-2 5-4.5 5.5h-9C11.5 40 9.5 38 9.5 35V23c0-6 2-10 5-12V7z"/>
      <rect x="12" y="4" width="12" height="4" rx="1.5"/>
      <path d="M15 25l6-4v8z" stroke-width="1" opacity="0.4"/>
    </svg>`;
    if (canPick) {
      el.onclick = () => pickBeachBottle(el, i);
    } else {
      el.onclick = () => showToast('这个瓶子还没漂到岸边，明天再来看看');
    }
    area.appendChild(el);
    beachBottles.push(el);
  }

  addBeachDecor(area);
}

// ====== AI 接口（使用 chat.html 相同的 OpenAI 兼容格式） ======
async function callAI(systemPrompt, userContent, temperature) {
  if (!apiConfig || !apiConfig.key || !apiConfig.url) return null;
  try {
    const res = await fetch(`${apiConfig.url}/chat/completions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiConfig.key}`
      },
      body: JSON.stringify({
        model: apiConfig.model || 'gpt-4o-mini',
        temperature: temperature || 0.9,
        max_tokens: 8000,
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userContent }
        ]
      })
    });
    if (!res.ok) return null;
    const data = await res.json();
    return data.choices?.[0]?.message?.content?.trim() || null;
  } catch(e) { return null; }
}

async function getLoverMemory() {
  if (!loverChatId) return '';
  try {
    const chatMessages = await DB.get('ins_chat_messages_v1');
    if (!chatMessages || !chatMessages[loverChatId]) return '';
    const msgs = chatMessages[loverChatId].slice(-30);
    return msgs.map(m => {
      const name = m.from === 'me' ? myName : charName;
      let txt = m.text || '';
      if (m.type === 'transfer') txt = `[转账 ¥${m.amount}]`;
      return `${name}: ${txt.replace(/<[^>]+>/g, '')}`;
    }).join('\n');
  } catch(e) { return ''; }
}

let bottlePickCooldown = false;

function pickBeachBottle(el, bottleIdx) {

async function generateDriftBottle() {
  const moodIcon = MOOD_ICONS[Math.floor(Math.random() * MOOD_ICONS.length)];

  const fromLabels = [
    '来自：某个秋天', '来自：某个雨天', '来自：某个清晨',
    '来自：某个深夜', '来自：某座城市', '来自：某个晴天'
  ];
  const fromLabel = fromLabels[Math.floor(Math.random() * fromLabels.length)];

  const existingSnippets = jData.pickedDrifts.slice(-5).map(d => (d.body||'').substring(0, 30)).join('；');
  const antiRepeat = existingSnippets ? `\n\n【禁止重复】最近生成过的内容片段：${existingSnippets}。请确保本次完全不同。` : '';

  const systemPrompt = `你要写一封漂流瓶信件，模拟一个真实的普通人写的心里话。

【写作铁律】
1. 全文用第一人称"我"来写。你就是这个写信的人。
2. 写一个具体的生活场景或者瞬间。要有画面：什么时候、在哪里、看见了什么、闻到了什么。
3. 用白描手法，参考汪曾祺、史铁生的文风。朴素、克制、不煽情。
4. 字数150-400字。写完整，不要断句。
5. 不需要称呼，不需要署名。就是一段心里话。
6. 只输出信件内容，不要任何额外说明。` + antiRepeat;

  const body = await callAI(systemPrompt, '请写一封漂流瓶信件。随机选一个主题：深夜、雨天、一个人吃饭、想起某个人、搬家、加班、旅行、养的猫、窗外的风景、小时候的事。不要和之前重复。');

  const hasGift = Math.random() < 0.25;
  const gift = hasGift ? getRandomGift('stranger') : null;

  if (!body) {
    showToast('这个瓶子里的信被海水泡糊了……');
    return;
  }
const driftEntry = {
    moodIcon,
    fromLabel,
    body: body || getDefaultDriftBody(),
    date: new Date().toISOString(),
    unread: true,
    gift
  };

  jData.pickedDrifts.push(driftEntry);

  if (gift) {
    jData.cabinet.push({
      ...gift,
      from: 'stranger',
      date: new Date().toLocaleDateString('zh-CN').replace(/\//g, '.'),
      isNew: true
    });
    await saveData();
    renderAll();
    openDriftByIdx(jData.pickedDrifts.length - 1);
    setTimeout(() => showGiftModal(gift), 800);
  } else {
    await saveData();
    renderDriftList();
    openDriftByIdx(jData.pickedDrifts.length - 1);
  }
}

function getDefaultDriftBody() {
  const defaults = [
    `我终于鼓起勇气辞职了。\n\n所有人都说我疯了，说经济不好，说找工作难。\n\n但今天下午坐在公园里晒太阳，买了杯很甜的奶茶。\n\n这是我很久以来，第一次在工作日的下午这样坐着。\n\n我不知道以后怎么样。但这一刻，我觉得我是活着的。`,
    `今天我爸说了一句话：\n\n"你做得很好。"\n\n就这五个字。\n\n我等了二十八年。\n\n跑回房间，哭了好久好久。\n\n他说了。他说了。`,
    `失眠第17天。\n\n我发现夜里三点的城市有一种奇异的平静。\n\n便利店的灯是亮着的，有人骑车经过，有猫在路灯下面洗脸。\n\n世界还在，我也还在。`
  ];
  return defaults[Math.floor(Math.random() * defaults.length)];
}

// ====== 工具函数 ======
function formatDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const now = new Date();
  const diff = now - d;
  const day = 86400000;
  if (diff < 60000) return '刚刚';
  if (diff < day) return '今天';
  if (diff < 2 * day) return '昨天';
  if (diff < 7 * day) return Math.floor(diff / day) + '天前';
  return (d.getMonth() + 1) + '/' + d.getDate();
}

function formatDateFull(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

function showToast(msg) {
  let t = document.getElementById('jieyou-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'jieyou-toast';
    t.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%) translateY(-20px);opacity:0;background:rgba(20,18,28,0.95);color:var(--paper);padding:10px 20px;border-radius:30px;font-size:12px;z-index:9999;transition:all 0.3s;pointer-events:none;border:1px solid rgba(201,162,39,0.3);letter-spacing:1px;';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  t.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => {
    t.style.opacity = '0';
    t.style.transform = 'translateX(-50%) translateY(-20px)';
  }, 2500);
}

// ====== 每隔一段时间，Char 会主动来信 ======
function scheduleNextCharLetter() {
  const last = jData.parallelLetters[0];
  if (!last) return;
  const lastTime = new Date(last.date).getTime();
  const now = Date.now();
  const hoursSinceLast = (now - lastTime) / 3600000;

  if (hoursSinceLast > 24 && Math.random() < 0.4) {
    generateCharLetter();
  }
}

// ====== 多选删除 ======
let isManageMode = false;

function toggleManageMode() {
  isManageMode = !isManageMode;
  const btn = document.getElementById('toggle-manage-btn');
  const actions = document.getElementById('manage-actions');
  
  if (isManageMode) {
    btn.style.display = 'none';
    actions.style.display = 'flex';
    document.querySelectorAll('.letter-card').forEach(card => {
      card.classList.add('selectable');
    });
  } else {
    btn.style.display = 'flex';
    actions.style.display = 'none';
    document.querySelectorAll('.letter-card').forEach(card => {
      card.classList.remove('selectable', 'selected');
    });
  }
}

function selectAllLetters() {
  const cards = document.querySelectorAll('.letter-card.selectable');
  const allSelected = [...cards].every(c => c.classList.contains('selected'));
  cards.forEach(card => {
    if (allSelected) {
      card.classList.remove('selected');
    } else {
      card.classList.add('selected');
    }
  });
}

async function deleteSelected() {
  const selected = document.querySelectorAll('.letter-card.selected');
  if (selected.length === 0) {
    showToast('请先选择要删除的信件');
    return;
  }
  
  if (!confirm(`确定删除 ${selected.length} 封信吗？删除后无法恢复。`)) return;

  // 收集要删除的信件索引
  const toDelete = { x: [], parallel: [], stranger: [], me: [] };
  selected.forEach(card => {
    const type = card.dataset.letterType;
    const idx = parseInt(card.dataset.letterIdx);
    if (type && !isNaN(idx)) {
      toDelete[type].push(idx);
    }
  });

  // 从大到小排序后删除（避免索引偏移）
  Object.keys(toDelete).forEach(type => {
    toDelete[type].sort((a, b) => b - a);
    toDelete[type].forEach(idx => {
      if (type === 'x') jData.xLetters.splice(idx, 1);
      else if (type === 'parallel') jData.parallelLetters.splice(idx, 1);
      else if (type === 'stranger') jData.strangerLetters.splice(idx, 1);
      else if (type === 'me') jData.myLetters.splice(idx, 1);
    });
  });

  await saveData();
  toggleManageMode();
  renderInbox();
  showToast(`已删除 ${selected.length} 封信`);
}
